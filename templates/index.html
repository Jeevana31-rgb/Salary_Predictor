<html>
    <head>
        <title>Salary Predictor</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
    <body class="bg-light">
    <div class="container mt-5" >
        <div class="card shadow p-4 bg-info text-white" >
            <h2 class="card-title text-center mb-4">Salary Predictor</h2>
        <form method="POST">
            <div class="mb-3">
                <label for="experience" name="experience" class="form-label">Years of Experience</label>
                <input type="number" class="form-control" id="experience" name="experience" required>
        <button type="submit" class="btn btn-primary mt-3">Predict Salary</button>
            </form>
        </div>

        {% if ans %}
        <div class="alert alert success mt-4">
<h4>
    Predicted Salary is {{ans}} Rs
</h4>
        </div>

        {% endif %}
    </div>
    </body>
</html>
